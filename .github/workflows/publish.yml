name: Build and Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allows manual testing from GitHub Actions tab
  pull_request:       # Add this to run on pull requests
    branches: [ main ]  # Only run on PRs targeting main branch

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/microcircuit
    permissions:
      id-token: write  # Required for trusted publishing to PyPI
      contents: read

    steps:
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          python3 \
          python3-pip \
          libboost-dev \
          python3-venv
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Replace conda setup with direct pip installation
    - name: Install NEST and build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    # Install NEST Simulator directly via pip
    # As long as `pip install nest-simulator` is not yet available, this is the simplest option. 
    - name: Install NEST Simulator
      run: |
        pip install "nest-simulator @ git+https://github.com/nest/nest-simulator"  
       

    - name: Build package
      working-directory: ./PyNEST
      run: python -m build

    - name: Run basic test
      run: |
        pip install PyNEST/dist/*.whl
        python -c "import microcircuit; print(f'✓ Successfully imported microcircuit version {microcircuit.__version__}')"
        python -c "import nest; import microcircuit; print('✓ Basic imports working')"

    # Skip the publish step for PRs
    - name: Publish to PyPI
      if: github.event_name == 'release'  # Only run on release events
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        # Install twine
        pip install twine

        # Publish to PyPI
        python -m twine upload --repository pypi PyNEST/dist/*
